# -- General Settings ------------------------------------------
set-option -g default-shell /opt/homebrew/bin/fish
set -g default-terminal "screen-256color"
# set -g default-terminal "xterm-256color"
set -as terminal-features ",xterm-256color:RGB"
set-option -g focus-events on

# Use Ctrl+b (Default)
set -g prefix C-b
bind C-b send-prefix

set -g escape-time 0
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g allow-passthrough on

# -- Key Bindings --------------------------------------------

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Split panes (stay in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Windows (tabs) - stay in current directory
bind c new-window -c "#{pane_current_path}"
bind & kill-window
bind , command-prompt -I "#W" "rename-window '%%'"
bind -r n next-window
bind -r p previous-window
bind -r Tab last-window

# Reflect the foreground program's own title (e.g. Claude Code's current
# task) in the window name instead of just the process name
set -g automatic-rename on
set -g automatic-rename-format '#{pane_title}'

# -- Status Bar (gruvbox theme handles this, see Plugins below) --------

# -- Plugins -----------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'z3z1ma/tmux-gruvbox'

set -g @gruvbox_flavour 'dark'
set -g @gruvbox_window_left_separator ''
set -g @gruvbox_window_right_separator ' '
set -g @gruvbox_window_middle_separator ' █'
set -g @gruvbox_window_number_position "right"
set -g @gruvbox_window_status_enable "yes"
set -g @gruvbox_window_status_icon_enable "yes"
set -g @gruvbox_window_default_fill "number"
set -g @gruvbox_window_current_fill "number"
set -g @gruvbox_status_modules_left "directory"
set -g @gruvbox_status_modules_right "application session date_time"
set -g @gruvbox_status_left_separator ''
set -g @gruvbox_status_right_separator ' '
set -g @gruvbox_status_fill "icon"
set -g @gruvbox_status_connect_separator "no"

run '/Users/leezhengjing/.config/tmux/plugins/tpm/tpm'

